<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Vintage Price Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        /* Global transitions */
        button, input, .gallery-item, .mode-tab, .sort-btn, .year-btn, .mode-option, .quick-btn {
            transition: all 0.2s ease;
        }
        
        /* Smooth fade animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* Loading */
        .loading-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .loading-screen.hidden { display: none; }
        .loading-title { font-size: 32px; font-weight: 700; margin-bottom: 16px; }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #333;
            border-top-color: #4ade80;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 16px; color: #666; }
        .loading-error { color: #f87171; margin-top: 16px; }
        
        /* App */
        .app { display: none; }
        .app.active { display: block; }
        
        /* Header */
        .header {
            background: #111;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo { font-size: 18px; font-weight: 700; }
        .stats-badge { font-size: 12px; color: #666; }
        .mode-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
        .mode-tab {
            padding: 10px 16px;
            border: none;
            background: #222;
            color: #888;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .mode-tab:hover { background: #2a2a2a; color: #aaa; }
        .mode-tab.active { background: #333; color: #fff; }
        
        /* Gallery */
        .gallery-section { padding: 16px; }
